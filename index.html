<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频剧本提取器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f0eb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding:20px}
.container{max-width:800px;margin:0 auto}
h1{text-align:center;font-size:1.6rem;color:#2d1b0e;margin:20px 0 10px}
.sub{text-align:center;color:#8b7355;margin-bottom:24px;font-size:.85rem}
.card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,0.06);margin-bottom:16px}
label{display:block;font-size:.85rem;color:#5c4a3a;margin-bottom:4px;font-weight:500}
input,select{width:100%;padding:10px 14px;border:1.5px solid #e0d5c7;border-radius:8px;font-size:.9rem;outline:none;margin-bottom:12px;font-family:inherit}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#8b5e3c,#a0724e);color:#fff;border:none;border-radius:10px;font-size:1.1rem;cursor:pointer;font-weight:600;letter-spacing:1px;margin-bottom:8px}
.btn:disabled{opacity:0.6;pointer-events:none}
.file-area{border:2px dashed #e0d5c7;border-radius:10px;padding:30px;text-align:center;cursor:pointer;margin-bottom:12px;transition:.2s}
.file-area:hover{border-color:#c4a882;background:#fdfbf7}
.file-area input{display:none}
.result{white-space:pre-wrap;line-height:1.8;font-size:.9rem;color:#3d2b1a;background:#fdfbf7;border:1.5px solid #e8ddd0;padding:20px;border-radius:10px;min-height:200px}
.loading{text-align:center;color:#a0896e;padding:40px 0;display:none}
.empty{text-align:center;color:#c4b8a7;padding:60px 0}
.opt-row{display:flex;gap:12px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.opt-row label{display:flex;align-items:center;gap:6px;margin:0;font-size:.8rem;cursor:pointer}
.info{text-align:center;color:#c4b8a7;font-size:.75rem;margin-top:10px}
</style>
</head>
<body>
<div class="container">
<h1>📺 视频剧本提取器</h1>
<p class="sub">上传视频 → OCR画面字幕 + 语音识别 · 一键完成</p>
<div class="card">
  <div style="margin-bottom:12px">
    <label>B站视频链接（优先CC字幕，秒出）</label>
    <input id="url" placeholder="https://www.bilibili.com/video/BV1xx...">
  </div>
  <div class="file-area" onclick="document.getElementById('video').click()">
    <input type="file" id="video" accept="video/*,.mp4,.mkv,.avi,.mov">
    <div style="font-size:2.8rem;margin-bottom:8px">📁</div>
    <div style="color:#8b7355;font-size:.95rem">上传视频 → 自动提取字幕 + 语音</div>
    <div id="filename" style="color:#a0896e;font-size:.8rem;margin-top:5px"></div>
  </div>
  <div class="opt-row">
    <label><input type="checkbox" id="ocr" checked> OCR画面字幕</label>
    <label><input type="checkbox" id="asr" checked> 语音识别（需等视频时长）</label>
  </div>
  <button class="btn" id="btn" onclick="process()">✨ 开始提取</button>
</div>
<div class="card">
  <div id="result" class="empty">👆 粘贴B站链接或上传视频后点击开始</div>
  <div id="loading" class="loading">⏳ 处理中...</div>
</div>
<p class="info">永久在线 · 无需服务器 · 百度云OCR+ASR · 免费</p>
</div>
<script>
const BK="nbDfosvp1R3WK2TEndosnJJQ",BS="ibae16pQGk0xf6CbIXSqPaZyMRB7p916";
const AK="5Q6ZsxtbejdtDSC3Hlu4fV9P",AS="ZILps5tRz1IgFi16XRdJqJlhCzsxem3t";
const PX="https://corsproxy.io/?";
async function fp(url,data){return fetch(PX+encodeURIComponent(url),{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams(data)})}
async function fj(url,data){return fetch(PX+encodeURIComponent(url),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})}
async function tk(k,s){const r=await fp("https://aip.baidubce.com/oauth/2.0/token",{grant_type:"client_credentials",client_id:k,client_secret:s});return(await r.json()).access_token||''}
function bv(u){const m=u.match(/BV[\w]{10}/);return m?m[0]:u}
document.getElementById('video').addEventListener('change',e=>document.getElementById('filename').textContent=e.target.files[0]?.name||'');
async function cc(url){
  const h={"User-Agent":"Mozilla/5.0","Referer":"https://www.bilibili.com"},b=bv(url);
  const i=await fetch(`https://api.bilibili.com/x/web-interface/view?bvid=${b}`,{h}).then(r=>r.json());
  const cid=i.data.cid,title=i.data.title;
  const s=await fetch(`https://api.bilibili.com/x/player/v2?bvid=${b}&cid=${cid}`,{h}).then(r=>r.json());
  if(!s.data.subtitle.subtitles.length)return null;
  let u=s.data.subtitle.subtitles[0].subtitle_url;if(u.startsWith('//'))u='https:'+u;
  const lines=await fetch(u).then(r=>r.json());
  return{title,text:lines.body.map(l=>{const m=Math.floor(l.from/60),s=Math.floor(l.from%60);return`[${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}] ${l.content}`}).join('\n'),n:lines.body.length};
}
async function ocrDo(file,token,p,results){
  const v=document.createElement('video');v.muted=true;v.src=URL.createObjectURL(file);
  await new Promise(r=>{v.onloadedmetadata=r;v.onerror=r;setTimeout(r,5000)});await new Promise(r=>setTimeout(r,800));
  if(!v.videoWidth){return'请用Chrome浏览器'}
  const dur=v.duration,c=document.createElement('canvas'),x=c.getContext('2d');c.width=v.videoWidth;c.height=v.videoHeight;
  const seen=new Set();
  for(let t=0.5;t<dur;t+=0.5){
    if(Math.floor(t)%3===0)p(`OCR ${Math.round(t/dur*100)}%`);
    v.currentTime=t;await new Promise(r=>{const h=()=>{v.removeEventListener('seeked',h);r()};v.addEventListener('seeked',h);setTimeout(r,3000)});
    x.drawImage(v,0,0);const h=v.videoHeight,cr=document.createElement('canvas');cr.width=v.videoWidth;cr.height=Math.floor(h*0.18);
    cr.getContext('2d').drawImage(c,0,Math.floor(h*0.82),v.videoWidth,Math.floor(h*0.18),0,0,cr.width,cr.height);
    const blob=await new Promise(r=>cr.toBlob(r,'image/jpeg',0.6));if(!blob)continue;
    const b64=await new Promise(r=>{const f=new FileReader();f.onload=()=>r(f.result.split(',')[1]);f.readAsDataURL(blob)});
    try{const r=await fp(`https://aip.baidubce.com/rest/2.0/ocr/v1/general_basic?access_token=${token}`,{image:b64});
    const d=await r.json();if(d.words_result){const t=d.words_result.map(w=>w.words).join(' ').trim();
    if(t&&!seen.has(t)){seen.add(t);const mm=Math.floor(t/60),ss=Math.floor(t%60);results.push(`[${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}] ${t}`);}}}catch(e){}
  }
  URL.revokeObjectURL(v.src);
}
async function asrDo(file,token,p,results){
  const v=document.createElement('video');v.volume=0;v.src=URL.createObjectURL(file);
  await new Promise(r=>{v.onloadedmetadata=r;setTimeout(r,8000)});const dur=v.duration;if(!dur||dur<1)return;
  // AudioContext 从播放中提取音频（volume=0静音但不阻断音频流）
  const ctx=new AudioContext({sampleRate:16000}),src=ctx.createMediaElementSource(v);
  const proc=ctx.createScriptProcessor(4096,1,1);src.connect(proc);proc.connect(ctx.destination);
  const chunks=[];let total=0;proc.onaudioprocess=e=>{const d=e.inputBuffer.getChannelData(0);chunks.push(new Float32Array(d));total+=d.length};
  v.play();
  for(let t=0;t<dur;t+=10){p(`录音 ${Math.round(t/dur*100)}%`);await new Promise(r=>setTimeout(r,10000))}
  v.pause();ctx.close();URL.revokeObjectURL(v.src);
  if(total<16000)return;
  // 合并所有采样为一个Int16Array
  const all=new Int16Array(total);let pos=0;
  for(const c of chunks){for(let j=0;j<c.length&&pos<total;j++)all[pos++]=Math.max(-32768,Math.min(32767,c[j]*32767))}
  // 60秒一块发送ASR
  const cs=60*16000;
  for(let i=0;i<total;i+=cs){
    const n=Math.min(cs,total-i);p(`ASR ${Math.round(i/total*100)}%`);
    let b64='';const bytes=new Uint8Array(all.buffer,i*2,n*2);
    for(let j=0;j<bytes.length;j+=65536)b64+=btoa(String.fromCharCode(...bytes.slice(j,j+65536)));
    try{const r=await fj(`https://vop.baidu.com/server_api?dev_pid=1537&cuid=web&token=${token}`,{format:"pcm",rate:16000,channel:1,speech:b64,len:n*2});const text=((await r.json()).result||[]).join('');if(text)results.push(text)}catch(e){}
  }
}
async function process(){
  const url=document.getElementById('url').value.trim(),file=document.getElementById('video').files[0];
  const uo=document.getElementById('ocr').checked,ua=document.getElementById('asr').checked;
  const res=[],p=msg=>document.getElementById('loading').innerText=`⏳ ${msg}`;
  document.getElementById('result').style.display='none';document.getElementById('loading').style.display='block';
  document.getElementById('btn').disabled=true;
  try{
    const dbg=[]; //调试信息
    if(url){const c=await cc(url);if(c)res.push(`## 📺 ${c.title}\n### ✅ B站CC字幕（${c.n}条）\n${c.text}`);else dbg.push('CC字幕:无')}
    if(file){
      p('初始化...');
      if(uo){dbg.push('OCR:开始');const t=await tk(BK,BS);dbg.push('OCR Token:'+(t?'OK':'失败'));if(t){const r=[];await ocrDo(file,t,p,r);dbg.push('OCR结果:'+r.length+'条');res.push(r.length?('### 🖼️ OCR画面字幕\n'+r.join('\n')):'⚠️ OCR未识别到文字')}}
      if(ua){dbg.push('ASR:开始');const t2=await tk(AK,AS);dbg.push('ASR Token:'+(t2?'OK':'失败'));if(t2){const r=[];await asrDo(file,t2,p,r);dbg.push('ASR结果:'+r.length+'条');res.push(r.length?('### 🎙️ 语音识别\n'+r.join('\n')):'⚠️ ASR无结果')}}
    }
    document.getElementById('loading').style.display='none';document.getElementById('result').style.display='block';
    document.getElementById('result').textContent=res.length?res.join('\n\n---\n'):'请粘贴B站链接或上传视频';
  }catch(e){document.getElementById('loading').style.display='none';document.getElementById('result').style.display='block';document.getElementById('result').textContent='❌ 失败：'+e.message}
  document.getElementById('btn').disabled=false;
}
</script>
</body>
</html>
