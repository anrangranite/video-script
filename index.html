<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频剧本提取器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f0eb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding:20px}
.container{max-width:800px;margin:0 auto}
h1{text-align:center;font-size:1.6rem;color:#2d1b0e;margin:20px 0 10px}
.sub{text-align:center;color:#8b7355;margin-bottom:24px;font-size:.85rem}
.card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,0.06);margin-bottom:16px}
label{display:block;font-size:.85rem;color:#5c4a3a;margin-bottom:4px;font-weight:500}
input,select{width:100%;padding:10px 14px;border:1.5px solid #e0d5c7;border-radius:8px;font-size:.9rem;outline:none;margin-bottom:12px;font-family:inherit}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#8b5e3c,#a0724e);color:#fff;border:none;border-radius:10px;font-size:1.1rem;cursor:pointer;font-weight:600;letter-spacing:1px;margin-bottom:8px}
.btn:disabled{opacity:0.6;pointer-events:none}
.file-area{border:2px dashed #e0d5c7;border-radius:10px;padding:30px;text-align:center;cursor:pointer;margin-bottom:12px;transition:.2s}
.file-area:hover{border-color:#c4a882;background:#fdfbf7}
.file-area input{display:none}
.result{white-space:pre-wrap;line-height:1.8;font-size:.9rem;color:#3d2b1a;background:#fdfbf7;border:1.5px solid #e8ddd0;padding:20px;border-radius:10px;min-height:200px}
.loading{text-align:center;color:#a0896e;padding:40px 0;display:none}
.empty{text-align:center;color:#c4b8a7;padding:60px 0}
.opt-row{display:flex;gap:12px;align-items:center;margin-bottom:12px}
.opt-row label{display:flex;align-items:center;gap:6px;margin:0;font-size:.8rem;cursor:pointer}
</style>
</head>
<body>
<div class="container">
<h1>📺 视频剧本提取器</h1>
<p class="sub">B站CC字幕 + 百度云OCR + 语音识别 | 无需后台</p>

<div class="card">
  <div style="margin-bottom:12px">
    <label>B站视频链接（优先使用CC字幕，免费）</label>
    <input id="url" placeholder="https://www.bilibili.com/video/BV1xx... 或 https://b23.tv/xxx">
  </div>
  <div class="file-area" onclick="document.getElementById('video').click()">
    <input type="file" id="video" accept="video/*,.mp4,.mkv,.avi,.mov">
    <div style="font-size:2.5rem;margin-bottom:8px">📁</div>
    <div style="color:#8b7355;font-size:.9rem">点击上传视频文件</div>
    <div id="filename" style="color:#a0896e;font-size:.8rem;margin-top:5px"></div>
  </div>
  <div class="opt-row">
    <label><input type="checkbox" id="ocr" checked> OCR画面字幕（百度云，免费1000次/月）</label>
    <label><input type="checkbox" id="asr"> 语音识别（百度云，免费5万次/天）</label>
  </div>
  <button class="btn" id="btn" onclick="process()">✨ 开始提取</button>
</div>

<div class="card">
  <div id="result" class="empty">👆 粘贴B站链接或上传视频文件后点击开始</div>
  <div id="loading" class="loading">⏳ 处理中，请耐心等待...</div>
</div>
<p style="text-align:center;color:#c4b8a7;font-size:.75rem;margin-top:10px">永久在线 · 无需服务器 · 免费使用</p>
</div>

<script>
const B_KEY = "nbDfosvp1R3WK2TEndosnJJQ";
const B_SECRET = "ibae16pQGk0xf6CbIXSqPaZyMRB7p916";
const ASR_KEY = "5Q6ZsxtbejdtDSC3Hlu4fV9P";
const ASR_SECRET = "ZILps5tRz1IgFi16XRdJqJlhCzsxem3t";

document.getElementById('video').addEventListener('change', function(e){
  document.getElementById('filename').textContent = e.target.files[0]?.name || '';
});

async function fetchPOST(url, data){
  // 通过 corsproxy.io 绕过CORS
  const proxy = "https://corsproxy.io/?" + encodeURIComponent(url);
  return fetch(proxy, {method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: new URLSearchParams(data)});
}
async function fetchJSON(url, data){
  const proxy = "https://corsproxy.io/?" + encodeURIComponent(url);
  return fetch(proxy, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data)});
}

async function getBaiduToken(){const r=await fetchPOST("https://aip.baidubce.com/oauth/2.0/token",{grant_type:"client_credentials",client_id:B_KEY,client_secret:B_SECRET});return (await r.json()).access_token||'';}
async function getASRToken(){const r=await fetchPOST("https://aip.baidubce.com/oauth/2.0/token",{grant_type:"client_credentials",client_id:ASR_KEY,client_secret:ASR_SECRET});return (await r.json()).access_token||'';}

function extractBV(url){const m=url.match(/BV[\w]{10}/);return m?m[0]:url;}

async function getCCSubtitle(url){
  const bv=extractBV(url);
  const headers={"User-Agent":"Mozilla/5.0","Referer":"https://www.bilibili.com"};
  const info=await fetch(`https://api.bilibili.com/x/web-interface/view?bvid=${bv}`,{headers}).then(r=>r.json());
  const cid=info.data.cid,title=info.data.title;
  const sub=await fetch(`https://api.bilibili.com/x/player/v2?bvid=${bv}&cid=${cid}`,{headers}).then(r=>r.json());
  const subs=sub.data.subtitle.subtitles;
  if(!subs.length)return null;
  let u=subs[0].subtitle_url;
  if(u.startsWith('//'))u='https:'+u;
  const lines=await fetch(u).then(r=>r.json());
  const script=lines.body.map(l=>{const m=Math.floor(l.from/60),s=Math.floor(l.from%60);return`[${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}] ${l.content}`}).join('\n');
  return{title,script,count:lines.body.length};
}

async function loadFFmpeg(){
  if(window._ff){return window._ff}
  const{createFFmpeg}=await import('https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/ffmpeg.min.js');
  window._ff=createFFmpeg({log:false});await window._ff.load();return window._ff;
}

async function ocrFrame(b64,token,seen,results,t){
  try{const r=await fetchPOST(`https://aip.baidubce.com/rest/2.0/ocr/v1/general_basic?access_token=${token}`,{image:b64});
  const d=await r.json();if(d.words_result){const text=d.words_result.map(w=>w.words).join(' ').trim();
  if(text&&!seen.has(text)){seen.add(text);const m=Math.floor(t/60),s=Math.floor(t%60);results.push(`[${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}] ${text}`);}}}catch(e){}
}

function toBase64Chunked(bytes){let b64='';for(let i=0;i<bytes.length;i+=65536)b64+=btoa(String.fromCharCode(...bytes.slice(i,i+65536)));return b64;}

async function baiduOCR(file,progress){
  const token=await getBaiduToken();if(!token)return'';
  progress.innerText='⏳ 加载ffmpeg...';
  const ff=await loadFFmpeg();
  const buf=new Uint8Array(await file.arrayBuffer());ff.FS('writeFile','in.mp4',buf);
  progress.innerText='⏳ 获取视频信息...';
  await ff.run('-i','in.mp4','-f','null','/dev/null');
  const dur=parseFloat([...ff.FS('readFile','/dev/null')].reduce((a,b)=>a+b,0)===0?'0':'');
  // 每0.5秒提取一帧
  const seen=new Set(),results=[];
  const info=await new Promise(r=>{const fn='info.txt';ff.FS('writeFile',fn,'');ff.run('-i','in.mp4','-f','ffmetadata',fn).then(()=>{r('')})});
  let vw=640,vh=360;//默认尺寸
  ff.run('-i','in.mp4','-vf','fps=1/0.5:round=down','-s','640x360','-q:v','5','frames/%03d.jpg').then(async()=>{
    const files=Object.keys(ff.FS('readdir','/')).filter(f=>f.endsWith('.jpg')).sort();
    const total=files.length;
    for(let i=0;i<total;i++){
      if(i%6===0)progress.innerText=`⏳ OCR识别... ${Math.round(i/total*100)}%`;
      const jpg=ff.FS('readFile','frames/'+files[i]);const b64=toBase64Chunked(jpg);
      const t=i*0.5+0.25;await ocrFrame(b64,token,seen,results,t);
      ff.FS('unlink','frames/'+files[i]);
    }
  });
  // 等待ffmpeg完成
  await new Promise(r=>setTimeout(r,Math.max(5000,dur*2*1000)));
  ff.FS('unlink','in.mp4');try{ff.FS('unlink','frames')}catch(e){}
  return results.length?results.join('\n'):'OCR未识别到文字，请确认视频有字幕或画面中有文字';
}

async function baiduASR(file,progress){
  const token=await getASRToken();if(!token)return'';
  progress.innerText='⏳ 提取音频（ffmpeg.wasm，首次加载约30MB）...';

  // 动态加载 ffmpeg.wasm
  if(!window.FFmpeg){const{createFFmpeg}=await import('https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/ffmpeg.min.js');
    window.FFmpeg=createFFmpeg({log:false});await window.FFmpeg.load();}
  const ffmpeg=window.FFmpeg;

  const buf=await file.arrayBuffer();
  ffmpeg.FS('writeFile','input.mp4',new Uint8Array(buf));
  await ffmpeg.run('-i','input.mp4','-vn','-acodec','pcm_s16le','-ar','16000','-ac','1','-f','s16le','output.pcm');
  const pcm=ffmpeg.FS('readFile','output.pcm');
  ffmpeg.FS('unlink','input.mp4');ffmpeg.FS('unlink','output.pcm');

  const i16=new Int16Array(pcm.buffer,pcm.byteOffset,pcm.byteLength/2);
  const results=[],chunk=60*16000;
  for(let i=0;i<i16.length;i+=chunk){
    progress.innerText=`⏳ 语音识别... ${Math.round(i/i16.length*100)}%`;
    const seg=i16.slice(i,i+chunk),bytes=new Uint8Array(seg.buffer);
    const b64=toBase64Chunked(bytes);
    try{const r=await fetchJSON(`https://vop.baidu.com/server_api?dev_pid=1537&cuid=web&token=${token}`,{format:"pcm",rate:16000,channel:1,speech:b64,len:seg.length*2});
    const text=((await r.json()).result||[]).join('');if(text)results.push(text)}catch(e){}
  }
  return results.join('\n')||'';
}

async function process(){
  const url=document.getElementById('url').value.trim(),file=document.getElementById('video').files[0];
  const useOCR=document.getElementById('ocr').checked,useASR=document.getElementById('asr').checked;
  const results=[],progress=document.querySelector('#loading');
  document.getElementById('result').style.display='none';progress.style.display='block';
  document.getElementById('btn').disabled=true;
  try{
    if(url){const cc=await getCCSubtitle(url);if(cc)results.push(`## 📺 ${cc.title}\n\n### ✅ B站CC字幕（${cc.count}条）\n${cc.script}`);else results.push('## ⚠️ 无CC字幕\n请上传视频使用OCR或语音识别');}
    if(file&&useOCR){const ocrText=await baiduOCR(file,progress);if(ocrText)results.push('### 🖼️ OCR画面字幕\n'+ocrText);}
    if(file&&useASR){const asrText=await baiduASR(file,progress);if(asrText)results.push('### 🎙️ 语音识别\n'+asrText);}
    progress.style.display='none';document.getElementById('result').style.display='block';
    document.getElementById('result').textContent=results.length?results.join('\n\n---\n'):'请粘贴B站链接或上传视频文件';
  }catch(e){
    progress.style.display='none';document.getElementById('result').style.display='block';
    document.getElementById('result').textContent='❌ 失败：'+e.message;
  }
  document.getElementById('btn').disabled=false;
}
</script>
</body>
</html>
